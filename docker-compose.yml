services:
  hello-lab:
    build: .
    container_name: hello-lab
    restart: unless-stopped
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.hello-lab.rule=Host(`hello-lab.lab.local`)"
      - "traefik.http.routers.hello-lab.entrypoints=web"
      - "traefik.http.services.hello-lab.loadbalancer.server.port=3000"
    networks:
      - web

networks:
  web:
    external: true
